name: CI
on:
  push:
    branches: [dev]
  pull_request:
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        run: |
          npm --prefix frontend ci
          npm --prefix frontend run build
          touch web/static/dist/.gitkeep
      - run: go vet ./...
      - run: go test ./...
      - name: go build
        run: |
          VERSION="$(git describe --tags --always --dirty 2>/dev/null | sed 's/^v//')"
          VERSION="${VERSION:-dev}"
          CGO_ENABLED=0 go build -trimpath \
            -ldflags "-s -w -X github.com/user/atria/internal/version.Version=${VERSION}" \
            -o dist/atria ./cmd/atria
      - name: Shell script syntax check
        run: bash -n scripts/*.sh
      - name: Smoke test
        run: bash scripts/smoke.sh

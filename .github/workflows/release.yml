# Atria Release 工作流
# 触发条件：tag push (v*) 或手动触发
# 构建多平台二进制并创建 GitHub Release

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: 运行测试
        run: go test ./... -count=1

      - name: 构建发布包
        run: bash scripts/build_release.sh
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          BUILD_DATE: ${{ github.event.head_commit.timestamp }}

      - name: 检查发布产物
        run: bash scripts/check_release_artifacts.sh tmp/dist

      - name: 复制辅助脚本到 dist
        run: |
          cp scripts/install.sh tmp/dist/
          cp scripts/uninstall.sh tmp/dist/

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Atria ${{ github.ref_name }}

            轻量级自托管 MTProto Session 管理面板。

            ### 重要说明

            - 本版本为 alpha 预览版
            - 真实 Telegram 登录需要用户在真实环境中手动验证
            - 不支持批量登录、消息群发、刷量或绕过平台限制

            ### 安装

            **Linux 一键安装：**
            ```
            curl -fsSL https://raw.githubusercontent.com/akiiya/Atria/main/scripts/install.sh | bash
            ```

            **手动安装：**
            下载对应平台的压缩包，解压后运行 `./atria serve`

            ### 安全提醒

            - 请备份 `data/secret.key` 文件
            - 不要提交 `data/` 目录到代码仓库
            - 详见 [SECURITY.md](SECURITY.md)
          files: |
            tmp/dist/*.tar.gz
            tmp/dist/*.zip
            tmp/dist/checksums.txt
            tmp/dist/install.sh
            tmp/dist/uninstall.sh
          generate_release_notes: true
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

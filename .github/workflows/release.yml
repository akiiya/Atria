# Atria Release 工作流
# 触发条件：tag push (v*) 或手动触发
# 构建多平台二进制并创建 GitHub Release
# 支持同 tag 重复触发（alpha 阶段调试用）

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: 运行测试
        run: go test ./... -count=1

      - name: 构建发布包
        run: bash scripts/build_release.sh
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          BUILD_DATE: ${{ github.event.head_commit.timestamp }}

      - name: 检查发布产物
        run: bash scripts/check_release_artifacts.sh tmp/dist

      - name: 复制辅助脚本到 dist
        run: |
          cp scripts/install.sh tmp/dist/
          cp scripts/uninstall.sh tmp/dist/

      - name: 生成 Release Notes
        run: |
          cat > tmp/release-notes.md << 'NOTES_EOF'
          ## Atria ${{ github.ref_name }}

          轻量级自托管 MTProto Session 管理面板。

          ### Highlights

          - 嵌入式 Web 管理界面
          - 管理员初始化与登录
          - 加密的 Telegram API 凭据管理
          - MTProto 登录流程与加密 Session 存储
          - 账号资料同步与 Session 状态检测
          - 远端 Logout 与本地 Session 删除
          - 多平台发布产物
          - Linux 一键安装/卸载脚本
          - Web 自更新流程（含 checksum 校验）

          ### 安装

          **Linux 一键安装：**
          ```
          curl -fsSL https://raw.githubusercontent.com/akiiya/Atria/main/scripts/install.sh | bash
          ```

          **手动安装：**
          下载对应平台的压缩包，解压后运行 `./atria serve`

          ### 重要说明

          - 真实 Telegram 登录需要用户在真实环境中手动验证
          - 这不是稳定的生产版本
          - Atria 不支持批量登录、消息群发、刷量或绕过平台限制
          - Atria 与 Telegram 无关（Atria is not affiliated with Telegram）

          ### 安全提醒

          - 请备份 `data/secret.key` 文件
          - 不要提交 `data/` 目录到代码仓库
          - 详见 [SECURITY.md](SECURITY.md)
          NOTES_EOF

      - name: 删除已有 Release（支持同 tag 重复触发）
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "检查 tag $TAG 是否已有 Release..."
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "发现已有 Release，删除中..."
            gh release delete "$TAG" --yes --cleanup-tag=false
            echo "旧 Release 已删除（tag 保留）"
          else
            echo "无已有 Release，直接创建"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 创建 Release
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            tmp/dist/atria_linux_amd64.tar.gz \
            tmp/dist/atria_linux_arm64.tar.gz \
            tmp/dist/atria_windows_amd64.tar.gz \
            tmp/dist/atria_windows_arm64.tar.gz \
            tmp/dist/atria_darwin_amd64.tar.gz \
            tmp/dist/atria_darwin_arm64.tar.gz \
            tmp/dist/checksums.txt \
            tmp/dist/install.sh \
            tmp/dist/uninstall.sh \
            --title "$TAG" \
            --notes-file tmp/release-notes.md \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

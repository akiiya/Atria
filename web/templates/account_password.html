{{define "account_password.html"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - Atria</title>
    <link rel="stylesheet" href="/static/app.css">
    {{template "theme_script" .}}
</head>
<body>
    <div class="app-layout">
        {{template "sidebar" .}}
        <div class="app-main">
            {{template "topbar" .}}
            <div class="app-content">
                <div class="page-header">
                    <h1 class="page-title">两步验证</h1>
                    <p class="page-desc">该账号启用了两步验证</p>
                </div>

                {{if .Error}}
                <div class="alert alert-error">{{.Error}}</div>
                {{end}}

                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">两步验证密码</h3>
                    </div>
                    <div class="card-body">
                        <form method="POST" action="/accounts/login/password">
                            <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                            <input type="hidden" name="flow_id" value="{{.FlowID}}">

                            <div class="form-group">
                                <label for="password" class="form-label">两步验证密码</label>
                                <input type="password" id="password" name="password" class="form-input"
                                       placeholder="请输入两步验证密码" required>
                                <div class="form-hint">请输入 Telegram 两步验证密码</div>
                            </div>

                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary">提交密码</button>
                                <a href="/accounts/login" class="btn btn-outline">重新开始</a>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card" style="margin-top: 16px;">
                    <div class="card-body">
                        <div class="security-notes">
                            <div class="note-item">
                                <span class="note-icon">ℹ️</span>
                                <div class="note-content">
                                    <strong>说明</strong>
                                    <p>该账号启用了两步验证。密码不会保存。密码不会写入日志。</p>
                                </div>
                            </div>
                            <div class="note-item">
                                <span class="note-icon">🔒</span>
                                <div class="note-content">
                                    <strong>安全说明</strong>
                                    <p>两步验证密码不会写入日志，不会保存到数据库。</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
{{end}}

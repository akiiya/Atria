{{define "account_password.html"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - Atria</title>
    <link rel="stylesheet" href="/static/app.css">
    <meta name="csrf-token" content="{{.CSRFToken}}">
    {{template "theme_script" .}}
</head>
<body>
    <div class="app-layout">
        {{template "sidebar" .}}
        <div class="app-main">
            {{template "topbar" .}}
            <div class="app-content">
                <div class="page-header">
                    <div class="page-heading">
                        <h1 class="page-title">两步验证</h1>
                        <p class="page-desc">该账号启用了两步验证</p>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">两步验证密码</h3>
                    </div>
                    <div class="card-body">
                        <div id="password-error" class="alert alert-error" style="display: none;"></div>

                        <form id="password-form" onsubmit="return false;">
                            <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                            <input type="hidden" id="password-flow-id" name="flow_id" value="{{.FlowID}}">

                            <div class="form-group">
                                <label for="password" class="form-label">两步验证密码</label>
                                <input type="password" id="password" name="password" class="form-input"
                                       placeholder="请输入两步验证密码" required>
                                <div class="form-hint">请输入 Telegram 两步验证密码</div>
                            </div>

                            <div class="form-actions">
                                <button type="submit" id="btn-password" class="btn btn-primary"
                                        data-default-text="提交密码"
                                        data-loading-text="正在验证密码..."
                                        onclick="handlePasswordSubmit()">
                                    提交密码
                                </button>
                                <a href="/accounts/login" class="btn btn-outline">重新开始</a>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card" style="margin-top: 16px;">
                    <div class="card-body">
                        <div class="security-notes">
                            <div class="note-item">
                                <span class="note-icon">🔒</span>
                                <div class="note-content">
                                    <strong>安全说明</strong>
                                    <p>两步验证密码不会写入日志，不会保存到数据库。</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/app.js"></script>
    <script>
    (function() {
        function getCSRFToken() {
            var meta = document.querySelector('meta[name="csrf-token"]');
            return meta ? meta.getAttribute('content') : '';
        }

        function showError(msg) {
            var el = document.getElementById('password-error');
            if (el) { el.textContent = msg; el.style.display = 'block'; }
        }

        function setButtonLoading(loading) {
            var btn = document.getElementById('btn-password');
            if (!btn) return;
            if (loading) {
                btn.textContent = btn.getAttribute('data-loading-text');
                btn.disabled = true;
            } else {
                btn.textContent = btn.getAttribute('data-default-text');
                btn.disabled = false;
            }
        }

        window.handlePasswordSubmit = function() {
            var flowId = document.getElementById('password-flow-id').value;
            var password = document.getElementById('password').value;
            if (!flowId) { showError('登录流程已过期，请重新开始。'); return; }
            if (!password) { showError('密码不能为空。'); return; }

            document.getElementById('password-error').style.display = 'none';
            setButtonLoading(true);

            var formData = new FormData();
            formData.append('flow_id', flowId);
            formData.append('password', password);

            fetch('/api/accounts/login/password', {
                method: 'POST',
                headers: { 'X-CSRF-Token': getCSRFToken(), 'Accept': 'application/json' },
                body: formData
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                setButtonLoading(false);
                if (data.ok && data.next === 'done') {
                    window.location.href = data.redirect || '/accounts';
                } else {
                    showError(data.message || '密码提交失败。');
                }
            })
            .catch(function() {
                setButtonLoading(false);
                showError('网络请求失败，请检查网络连接。');
            });
        };

        var form = document.getElementById('password-form');
        if (form) {
            form.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') { e.preventDefault(); handlePasswordSubmit(); }
            });
        }
    })();
    </script>
</body>
</html>
{{end}}

{{define "account_code.html"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - Atria</title>
    <link rel="stylesheet" href="/static/app.css">
    <meta name="csrf-token" content="{{.CSRFToken}}">
    {{template "theme_script" .}}
</head>
<body>
    <div class="app-layout">
        {{template "sidebar" .}}
        <div class="app-main">
            {{template "topbar" .}}
            <div class="app-content">
                <div class="page-header">
                    <div class="page-heading">
                        <h1 class="page-title">输入验证码</h1>
                        <p class="page-desc">请填写 Telegram 发送的验证码</p>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">验证码</h3>
                    </div>
                    <div class="card-body">
                        <div id="code-error" class="alert alert-error" style="display: none;"></div>

                        <form id="code-form" onsubmit="return false;">
                            <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                            <input type="hidden" id="code-flow-id" name="flow_id" value="{{.FlowID}}">

                            <div class="form-group">
                                <label for="code" class="form-label">验证码</label>
                                <input type="text" id="code" name="code" class="form-input"
                                       placeholder="请输入验证码" required
                                       maxlength="10" autocomplete="one-time-code">
                                <div class="form-hint">请填写 Telegram 发送的验证码</div>
                            </div>

                            <div class="form-actions">
                                <button type="submit" id="btn-code" class="btn btn-primary"
                                        data-default-text="提交验证码"
                                        data-loading-text="正在验证..."
                                        onclick="handleCodeSubmit()">
                                    提交验证码
                                </button>
                                <a href="/accounts/login" class="btn btn-outline">重新开始</a>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card" style="margin-top: 16px;">
                    <div class="card-body">
                        <div class="security-notes">
                            <div class="note-item">
                                <span class="note-icon">🔒</span>
                                <div class="note-content">
                                    <strong>安全说明</strong>
                                    <p>验证码不会写入日志，不会保存到数据库。</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/app.js"></script>
    <script>
    (function() {
        function getCSRFToken() {
            var meta = document.querySelector('meta[name="csrf-token"]');
            return meta ? meta.getAttribute('content') : '';
        }

        function showError(msg) {
            var el = document.getElementById('code-error');
            if (el) { el.textContent = msg; el.style.display = 'block'; }
        }

        function setButtonLoading(loading) {
            var btn = document.getElementById('btn-code');
            if (!btn) return;
            if (loading) {
                btn.textContent = btn.getAttribute('data-loading-text');
                btn.disabled = true;
            } else {
                btn.textContent = btn.getAttribute('data-default-text');
                btn.disabled = false;
            }
        }

        window.handleCodeSubmit = function() {
            var flowId = document.getElementById('code-flow-id').value;
            var code = document.getElementById('code').value.trim();
            if (!flowId) { showError('登录流程已过期，请重新开始。'); return; }
            if (!code) { showError('验证码不能为空。'); return; }

            document.getElementById('code-error').style.display = 'none';
            setButtonLoading(true);

            var formData = new FormData();
            formData.append('flow_id', flowId);
            formData.append('code', code);

            fetch('/api/accounts/login/code', {
                method: 'POST',
                headers: { 'X-CSRF-Token': getCSRFToken(), 'Accept': 'application/json' },
                body: formData
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                setButtonLoading(false);
                if (data.ok) {
                    if (data.next === 'password') {
                        window.location.href = '/accounts/login/password?flow_id=' + encodeURIComponent(data.flow_id || flowId);
                    } else if (data.next === 'done') {
                        window.location.href = data.redirect || '/accounts';
                    }
                } else {
                    showError(data.message || '验证码提交失败。');
                }
            })
            .catch(function() {
                setButtonLoading(false);
                showError('网络请求失败，请检查网络连接。');
            });
        };

        var form = document.getElementById('code-form');
        if (form) {
            form.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') { e.preventDefault(); handleCodeSubmit(); }
            });
        }
    })();
    </script>
</body>
</html>
{{end}}

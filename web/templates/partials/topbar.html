{{define "topbar"}}
<header class="topbar">
    <div class="topbar-left">
        <!-- 留空，仅作为 flex 对齐的 spacer -->
    </div>
    <div class="topbar-right">
        <div class="theme-switcher">
            <button class="theme-btn" data-theme="light" title="浅色模式">☀️</button>
            <button class="theme-btn" data-theme="dark" title="深色模式">🌙</button>
            <button class="theme-btn" data-theme="system" title="跟随系统">💻</button>
        </div>
        {{if .IsAuthenticated}}
        <div class="topbar-settings">
            <button class="topbar-settings-btn" onclick="toggleSettingsMenu()" title="设置">
                ⚙️
            </button>
            <div class="settings-dropdown" id="settings-dropdown">
                <a href="/settings" class="dropdown-item">系统设置</a>
                <a href="/credentials" class="dropdown-item">Telegram API Key</a>
                <a href="/settings/proxy" class="dropdown-item">API 网络代理</a>
                <div class="dropdown-divider"></div>
                <a href="/settings/update" class="dropdown-item">检查更新</a>
            </div>
        </div>
        <div class="topbar-user">
            <span class="user-badge">👤 {{.CurrentAdminUsername}}</span>
        </div>
        <div class="topbar-logout">
            <form method="POST" action="/logout">
                <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                <button type="submit" class="btn btn-sm btn-outline" title="退出登录">退出</button>
            </form>
        </div>
        {{end}}
    </div>
</header>
<script>
function toggleSettingsMenu() {
    var dropdown = document.getElementById('settings-dropdown');
    dropdown.classList.toggle('show');
}
// 点击其他地方关闭下拉菜单
document.addEventListener('click', function(e) {
    var dropdown = document.getElementById('settings-dropdown');
    var btn = document.querySelector('.topbar-settings-btn');
    if (dropdown && !dropdown.contains(e.target) && !btn.contains(e.target)) {
        dropdown.classList.remove('show');
    }
});
</script>
{{end}}

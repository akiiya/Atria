{{define "sidebar"}}
<aside class="sidebar">
    <div class="sidebar-brand">
        <div class="brand-mark" aria-hidden="true">
            <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="34" height="34" rx="8" fill="#3b82f6"/>
                <path d="M17 7L25 21H22L20.5 18H13.5L12 21H9L17 7ZM14.5 16H19.5L17 10.5L14.5 16Z" fill="white"/>
                <circle cx="17" cy="24" r="2" fill="white" opacity="0.8"/>
            </svg>
        </div>
        <div class="brand-name">Atria</div>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section">
            <div class="nav-section-title">主要功能</div>
            <a href="/" class="nav-item{{if eq .ActivePage "dashboard"}} active{{end}}">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">仪表盘</span>
            </a>
            <a href="/credentials" class="nav-item{{if eq .ActivePage "credentials"}} active{{end}}">
                <span class="nav-icon">🔑</span>
                <span class="nav-label">API 凭据</span>
            </a>
            <a href="/accounts" class="nav-item{{if eq .ActivePage "accounts"}} active{{end}}">
                <span class="nav-icon">📱</span>
                <span class="nav-label">账号会话</span>
            </a>
            <a href="/audit" class="nav-item{{if eq .ActivePage "audit"}} active{{end}}">
                <span class="nav-icon">📋</span>
                <span class="nav-label">审计日志</span>
            </a>
        </div>
        <div class="nav-section">
            <div class="nav-section-title">系统</div>
            <a href="/settings" class="nav-item{{if eq .ActivePage "settings"}} active{{end}}">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">系统设置</span>
            </a>
            <a href="/security" class="nav-item{{if eq .ActivePage "security"}} active{{end}}">
                <span class="nav-icon">🛡️</span>
                <span class="nav-label">安全说明</span>
            </a>
        </div>
    </nav>
    <div class="sidebar-footer">
        <div class="sidebar-version">v{{.Version}}</div>
    </div>
</aside>
{{end}}

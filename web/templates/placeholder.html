{{define "placeholder.html"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - Atria</title>
    <link rel="stylesheet" href="/static/app.css">
    {{template "theme_script" .}}
</head>
<body>
    <div class="app-layout">
        {{template "sidebar" .}}
        <div class="app-main">
            {{template "topbar" .}}
            <div class="app-content">
                <div class="page-header">
                    <div class="page-heading">
                        <h1 class="page-title">{{.Title}}</h1>
                        <p class="page-desc">功能建设中</p>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div class="empty-state">
                            <div class="empty-icon">🚧</div>
                            <div class="empty-title">功能建设中</div>
                            <div class="empty-desc">此功能正在开发中，敬请期待。</div>
                            <a href="/" class="btn btn-primary">返回仪表盘</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
{{end}}
